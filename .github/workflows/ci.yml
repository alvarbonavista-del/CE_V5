name: CI (guardarrailes P00)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint, format, types, boundaries, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sincronizar entorno
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format (check)
        run: uv run ruff format --check .
      - name: mypy
        run: uv run mypy
      - name: Fronteras de import (7.1)
        run: uv run lint-imports
      - name: Contratos - regenerar y comparar schemas (7.3/7.4)
        run: uv run python tools/check_generated.py
      - name: Contratos - compatibilidad de evolucion (7.7)
        run: uv run python tools/check_schema_compat.py
      - name: Componentes - validacion de manifests (7.5)
        run: uv run python tools/check_manifests.py
      - name: Componentes - huerfanos (7.6)
        run: uv run python tools/check_orphans.py
      - name: Componentes - documentacion minima (7.9)
        run: uv run python tools/check_component_docs.py
      - name: Contratos - registro event_type -> payload (CA-06)
        run: uv run python tools/check_event_payload_registry.py
      - name: pytest
        run: uv run pytest

  backend-integration:
    name: Backend integration (DB + bus + tenancy)
    runs-on: ubuntu-latest
    # DOS roles (ADR-011): CE_V5_DATABASE_URL ya NO es el superusuario, es el
    # rol de aplicacion (sin BYPASSRLS). El servicio postgres arranca con el
    # usuario ce_v5, que es el rol de migraciones (dueno de las tablas).
    env:
      CE_V5_DATABASE_URL: postgresql://ce_v5_app:ce_v5_app@localhost:5432/ce_v5
      CE_V5_MIGRATIONS_DATABASE_URL: postgresql://ce_v5:ce_v5@localhost:5432/ce_v5
      CE_V5_APP_DB_PASSWORD: ce_v5_app
      CE_V5_REDIS_URL: redis://localhost:6379/0
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: ce_v5
          POSTGRES_PASSWORD: ce_v5
          POSTGRES_DB: ce_v5
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ce_v5 -d ce_v5"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8.8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sincronizar entorno
        run: uv sync --extra dev
      - name: Provisionar roles de aplicacion y operador (ADR-011, CA-03)
        # El operador se provisiona con el rol de MIGRACIONES; provision no
        # llama a DbConfig.from_env, asi que la guardia no interviene aqui.
        env:
          CE_V5_OPERATOR_DB_PASSWORD: ce_v5_operator
        run: uv run python -m ce_v5.infra.db.provision
      - name: Aplicar migraciones
        run: uv run python -m ce_v5.infra.db.migrations
      - name: Tenancy y RLS (7.8)
        run: uv run python tools/check_tenancy.py
      - name: Auditoria de seguridad (check audit, P06)
        run: uv run python tools/check_audit.py
      - name: Tests de integracion (DB + bus + policy)
        # El DSN de operador va SOLO en este paso (CA-03): ningun codigo que
        # corra aqui llama a DbConfig.from_env, que abortaria si lo viera.
        env:
          CE_V5_OPERATOR_DATABASE_URL: postgresql://ce_v5_operator:ce_v5_operator@localhost:5432/ce_v5
          CE_V5_OPERATOR_DB_PASSWORD: ce_v5_operator
        run: uv run pytest tests/integration -q

  frontend:
    name: Frontend (lint, format, types, boundaries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Sin 'version' aqui: la version de pnpm la fija SOLO packageManager en
      # package.json (unica fuente de verdad); duplicarla aborta con
      # ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile=false
      - name: Biome lint + format (check)
        run: pnpm exec biome check .
      - name: Type-check (frontend)
        run: node tools/check_types_frontend.mjs
      - name: Fronteras de import frontend (7.2)
        run: pnpm exec depcruise frontend/src --config .dependency-cruiser.cjs
      - name: Contratos - tipos TS en sincronia (7.3/7.4)
        run: node tools/check_generated_ts.mjs
