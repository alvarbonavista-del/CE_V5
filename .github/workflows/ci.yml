name: CI (guardarrailes P00)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (lint, format, types, boundaries, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sincronizar entorno
        run: uv sync --extra dev
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format (check)
        run: uv run ruff format --check .
      - name: mypy
        run: uv run mypy
      - name: Fronteras de import (7.1)
        run: uv run lint-imports
      - name: Contratos - regenerar y comparar schemas (7.3/7.4)
        run: uv run python tools/check_generated.py
      - name: Contratos - compatibilidad de evolucion (7.7)
        run: uv run python tools/check_schema_compat.py
      - name: pytest
        run: uv run pytest

  backend-integration:
    name: Backend integration DB (P02b)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: ce_v5
          POSTGRES_PASSWORD: ce_v5
          POSTGRES_DB: ce_v5
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ce_v5 -d ce_v5"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sincronizar entorno
        run: uv sync --extra dev
      - name: Tests de integracion DB (P02b)
        env:
          CE_V5_DATABASE_URL: postgresql://ce_v5:ce_v5@localhost:5432/ce_v5
        run: uv run pytest tests/integration -q

  frontend:
    name: Frontend (lint, format, types, boundaries)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile=false
      - name: Biome lint + format (check)
        run: pnpm exec biome check .
      - name: Type-check (frontend)
        run: node tools/check_types_frontend.mjs
      - name: Fronteras de import frontend (7.2)
        run: pnpm exec depcruise frontend/src --config .dependency-cruiser.cjs
      - name: Contratos - tipos TS en sincronia (7.3/7.4)
        run: node tools/check_generated_ts.mjs
