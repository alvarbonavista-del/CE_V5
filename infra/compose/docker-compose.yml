# Entorno local de desarrollo y tests (P02b PostgreSQL + P03 Redis).
# Bases de juguete: NUNCA datos reales. Se puede tirar y recrear.
services:
  postgres:
    image: postgres:18.4
    container_name: ce_v5_postgres
    environment:
      POSTGRES_USER: ce_v5
      POSTGRES_PASSWORD: ce_v5
      POSTGRES_DB: ce_v5
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ce_v5 -d ce_v5"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:8.8
    container_name: ce_v5_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
